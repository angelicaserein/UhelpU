<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本地玩家系统测试清单 · Local Player System</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Share+Tech+Mono&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0b0f;--surface:#111117;--surface2:#18181f;--surface3:#1f1f28;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#f0eeff;--text2:#b8b2d0;--text3:#8a84a8;
  --accent:#7c6dfa;--accent2:#a29bfe;
  --green:#00b894;--green2:#55efc4;
  --amber:#e17055;--amber2:#fab1a0;
  --red:#d63031;--red2:#ff7675;
  --mono:'Share Tech Mono',monospace;
  --sans:'Noto Sans SC',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:9999;}

.container{max-width:1000px;margin:0 auto;padding:40px 24px 100px;}

header{margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--border2);}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.title-block h1{font-family:var(--mono);font-size:20px;font-weight:400;color:var(--accent2);letter-spacing:0.05em;}
.title-block p{font-size:12px;color:var(--text2);margin-top:5px;font-family:var(--mono);}
.progress-block{text-align:right;}
.prog-nums{font-family:var(--mono);font-size:32px;color:var(--green2);line-height:1;}
.prog-nums small{font-size:13px;color:var(--text2);}
.prog-bar-wrap{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-top:8px;}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--green2));border-radius:2px;transition:width 0.4s;}

.toolbar{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;align-items:center;}
.btn{font-family:var(--mono);font-size:12px;padding:6px 14px;border-radius:4px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.btn:hover{border-color:var(--accent);color:var(--accent2);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.primary:hover{opacity:0.85;}
.btn.danger:hover{border-color:var(--red);color:var(--red2);}
.filter-group{margin-left:auto;display:flex;gap:4px;flex-wrap:wrap;}
.fbtn{font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:3px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.15s;}
.fbtn:hover,.fbtn.active{border-color:var(--accent);color:var(--accent2);}

.legend{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);}
.dot{width:8px;height:8px;border-radius:2px;}
.dot-normal{background:rgba(0,184,148,0.5);}
.dot-edge{background:rgba(225,112,85,0.5);}
.dot-bug{background:rgba(214,48,49,0.5);}

.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:28px;width:560px;max-width:90vw;}
.modal h2{font-family:var(--mono);font-size:15px;color:var(--accent2);margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;color:var(--text2);font-family:var(--mono);margin-bottom:5px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:4px;padding:8px 12px;font-family:var(--sans);font-size:13px;color:var(--text);outline:none;transition:border-color 0.15s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-select{cursor:pointer;}
.form-textarea{resize:vertical;min-height:60px;}
.form-row{display:flex;gap:8px;margin-top:16px;}
option{background:var(--surface3);}

.phase-section{margin-bottom:16px;border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:border-color 0.2s;}
.phase-section:hover{border-color:var(--border2);}
.phase-header{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--surface);cursor:pointer;user-select:none;transition:background 0.15s;}
.phase-header:hover{background:var(--surface2);}
.phase-badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 9px;border-radius:3px;white-space:nowrap;flex-shrink:0;letter-spacing:0.06em;}
.phase-name-block{flex:1;min-width:0;}
.phase-name{font-size:13px;font-weight:500;color:var(--text);}
.phase-shortdesc{font-size:11px;color:var(--text2);font-family:var(--mono);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.phase-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.phase-stat{font-family:var(--mono);font-size:11px;color:var(--text2);}
.phase-stat.all-done{color:var(--green);}
.phase-arrow{font-family:var(--mono);font-size:10px;color:var(--text2);transition:transform 0.2s;}
.collapsed .phase-arrow{transform:rotate(-90deg);}
.phase-edit-btn{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:2px;border:1px solid var(--border2);background:var(--surface3);color:var(--text2);cursor:pointer;opacity:0;transition:opacity 0.15s,color 0.1s;}
.phase-header:hover .phase-edit-btn{opacity:1;}
.phase-edit-btn:hover{color:var(--accent2);border-color:var(--accent);}

.phase-detail{background:var(--surface2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;gap:24px;flex-wrap:wrap;}
.detail-item{font-size:13px;display:flex;gap:8px;}
.detail-key{font-family:var(--mono);color:var(--accent2);flex-shrink:0;}
.detail-val{color:var(--text);}

.cases-body{background:var(--surface);}
.collapsed .cases-body,.collapsed .phase-detail{display:none;}

.case-row{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);transition:background 0.1s;position:relative;}
.case-row:last-child{border-bottom:none;}
.case-row:hover{background:var(--surface2);}
.case-row.done{opacity:0.6;}

.case-check{width:15px;height:15px;border:1px solid var(--border2);border-radius:3px;flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.case-check:hover{border-color:var(--green);}
.case-check.checked{background:var(--green);border-color:var(--green);}
.case-check.checked::after{content:'✓';font-size:9px;color:#000;font-weight:700;}

.case-content{flex:1;min-width:0;}
.case-text{font-size:13px;color:var(--text);line-height:1.55;cursor:pointer;}
.done .case-text{text-decoration:line-through;color:var(--text2);}
.case-tags{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;}
.tag{display:inline-block;font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:2px;}
.tag-normal{background:rgba(0,184,148,0.12);color:var(--green2);border:1px solid rgba(0,184,148,0.25);}
.tag-edge{background:rgba(225,112,85,0.12);color:var(--amber2);border:1px solid rgba(225,112,85,0.25);}
.tag-bug{background:rgba(214,48,49,0.12);color:var(--red2);border:1px solid rgba(214,48,49,0.25);}

.case-actions{display:flex;gap:3px;flex-shrink:0;opacity:0;transition:opacity 0.15s;}
.case-row:hover .case-actions{opacity:1;}
.cbtn{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:2px;border:1px solid var(--border);background:var(--surface3);color:var(--text3);cursor:pointer;transition:all 0.1s;}
.cbtn:hover{color:var(--text2);border-color:var(--border2);}
.cbtn.del:hover{color:var(--red2);border-color:var(--red);}

.add-case-wrap{padding:10px 16px;background:var(--surface2);border-top:1px solid var(--border);}
.add-case-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.add-input{flex:1;min-width:180px;background:var(--surface3);border:1px solid var(--border2);border-radius:4px;padding:6px 10px;font-family:var(--sans);font-size:13px;color:var(--text);outline:none;transition:border-color 0.15s;}
.add-input:focus{border-color:var(--accent);}
.add-select{background:var(--surface3);border:1px solid var(--border2);border-radius:4px;padding:6px 10px;font-family:var(--mono);font-size:11px;color:var(--text2);outline:none;cursor:pointer;}

.empty{padding:20px 16px;text-align:center;font-size:12px;color:var(--text3);font-family:var(--mono);}

.save-toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#000;font-family:var(--mono);font-size:12px;padding:8px 16px;border-radius:4px;display:none;z-index:2000;animation:fadeup 0.3s;}
@keyframes fadeup{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.stats-bar{display:flex;gap:20px;margin-top:16px;padding:12px 16px;background:var(--surface2);border-radius:5px;border:1px solid var(--border);flex-wrap:wrap;}
.stat-item{font-size:12px;}
.stat-val{font-family:var(--mono);color:var(--accent2);margin-right:4px;}
.stat-label{color:var(--text2);}
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-top">
      <div class="title-block">
        <h1>[ 本地玩家系统测试清单 ]</h1>
        <p>Local Player System · 名字输入 · 重名检测 · 排行榜 · 改名 · 可编辑 · 数据自动保存</p>
      </div>
      <div class="progress-block">
        <div class="prog-nums" id="prog-nums">0 <small>/ 0</small></div>
        <div style="font-size:11px;color:var(--text2);font-family:var(--mono);text-align:right;margin-top:2px;">已通过</div>
        <div class="prog-bar-wrap" style="width:180px;margin-left:auto;"><div class="prog-bar-fill" id="prog-fill"></div></div>
      </div>
    </div>
    <div class="stats-bar" id="stats-bar"></div>
    <div class="toolbar">
      <button class="btn primary" onclick="openAddPhaseModal()">＋ 新增阶段</button>
      <button class="btn" onclick="expandAll()">展开全部</button>
      <button class="btn" onclick="collapseAll()">折叠全部</button>
      <button class="btn" onclick="resetChecks()">重置勾选</button>
      <button class="btn primary" onclick="exportAsHTML()" title="生成新的 HTML 文件，包含当前所有数据，可直接发给他人">⬇ 导出为 HTML（发给他人用）</button>
      <div class="filter-group">
        <button class="fbtn active" data-filter="all" onclick="setFilter('all',this)">全部</button>
        <button class="fbtn" data-filter="normal" onclick="setFilter('normal',this)">正常流程</button>
        <button class="fbtn" data-filter="edge" onclick="setFilter('edge',this)">边界情况</button>
        <button class="fbtn" data-filter="bug" onclick="setFilter('bug',this)">潜在问题</button>
        <button class="fbtn" data-filter="undone" onclick="setFilter('undone',this)">未完成</button>
      </div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="dot dot-normal"></div><span style="color:var(--text2)">正常流程 — 主路径，必须全部通过</span></div>
      <div class="legend-item"><div class="dot dot-edge"></div><span style="color:var(--text2)">边界情况 — 非常规操作，容易被忽略</span></div>
      <div class="legend-item"><div class="dot dot-bug"></div><span style="color:var(--text2)">潜在问题 — 代码层面容易出 bug</span></div>
    </div>
  </header>

  <div id="phases-container"></div>

</div>

<!-- ADD/EDIT PHASE MODAL -->
<div class="modal-backdrop" id="phase-modal">
  <div class="modal">
    <h2 id="phase-modal-title">新增测试阶段</h2>
    <input type="hidden" id="edit-phase-id">
    <div class="form-group">
      <label class="form-label">阶段标识 (如 PHASE 1)</label>
      <input class="form-input" id="phase-badge-input" placeholder="PHASE 1">
    </div>
    <div class="form-group">
      <label class="form-label">阶段名称</label>
      <input class="form-input" id="phase-name-input" placeholder="名字输入">
    </div>
    <div class="form-group">
      <label class="form-label">阶段颜色</label>
      <select class="form-select" id="phase-color-input">
        <option value="purple">紫色（默认）</option>
        <option value="blue">蓝色</option>
        <option value="green">绿色</option>
        <option value="amber">橙色</option>
        <option value="red">红色</option>
        <option value="gray">灰色</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">前置条件</label>
      <input class="form-input" id="phase-time-input" placeholder="无 localStorage / 已有 localStorage">
    </div>
    <div class="form-group">
      <label class="form-label">涉及页面</label>
      <input class="form-input" id="phase-overlay-input" placeholder="NameInputPage / WorldSelect / WinPage">
    </div>
    <div class="form-group">
      <label class="form-label">触发条件（进入下一阶段）</label>
      <input class="form-input" id="phase-trigger-input" placeholder="玩家点击确认 / 通关">
    </div>
    <div class="form-group">
      <label class="form-label">阶段简要说明</label>
      <textarea class="form-textarea" id="phase-desc-input" placeholder="这个阶段的主要目的..."></textarea>
    </div>
    <div class="form-row">
      <button class="btn primary" onclick="savePhase()">保存</button>
      <button class="btn" onclick="closeModal('phase-modal')">取消</button>
      <button class="btn danger" id="delete-phase-btn" style="margin-left:auto;display:none;" onclick="deleteCurrentPhase()">删除阶段</button>
    </div>
  </div>
</div>

<!-- ADD/EDIT CASE MODAL -->
<div class="modal-backdrop" id="case-modal">
  <div class="modal">
    <h2 id="case-modal-title">新增测试用例</h2>
    <input type="hidden" id="edit-case-phase">
    <input type="hidden" id="edit-case-id">
    <div class="form-group">
      <label class="form-label">测试内容</label>
      <textarea class="form-textarea" id="case-text-input" placeholder="描述这个测试用例需要验证什么..." style="min-height:80px;"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">所属阶段</label>
      <select class="form-select" id="case-phase-select"></select>
    </div>
    <div class="form-group">
      <label class="form-label">类型</label>
      <select class="form-select" id="case-tag-input">
        <option value="normal">正常流程 — 主路径，必须通过</option>
        <option value="edge">边界情况 — 非常规操作</option>
        <option value="bug">潜在问题 — 容易出 bug</option>
      </select>
    </div>
    <div class="form-row">
      <button class="btn primary" onclick="saveCase()">保存</button>
      <button class="btn" onclick="closeModal('case-modal')">取消</button>
      <button class="btn danger" id="delete-case-btn" style="margin-left:auto;display:none;" onclick="deleteCurrentCase()">删除用例</button>
    </div>
  </div>
</div>

<div class="save-toast" id="save-toast">✓ 已保存</div>

<script>
const COLORS = {
  purple: {bg:'rgba(124,109,250,0.18)',text:'#a29bfe',border:'rgba(124,109,250,0.4)'},
  blue:   {bg:'rgba(56,133,220,0.18)',text:'#74b9ff',border:'rgba(56,133,220,0.4)'},
  green:  {bg:'rgba(0,184,148,0.18)',text:'#55efc4',border:'rgba(0,184,148,0.4)'},
  amber:  {bg:'rgba(225,112,85,0.18)',text:'#fab1a0',border:'rgba(225,112,85,0.4)'},
  red:    {bg:'rgba(214,48,49,0.18)',text:'#ff7675',border:'rgba(214,48,49,0.4)'},
  gray:   {bg:'rgba(116,110,140,0.18)',text:'#a09ab8',border:'rgba(116,110,140,0.4)'},
};

const DEFAULT_DATA = {
  phases: [
    {
      id:'p0', badge:'PHASE 0', name:'新玩家 — 名字输入', color:'purple',
      time:'无 localStorage 记录',
      overlay:'NameInputPage',
      trigger:'玩家输入名字点击确认',
      desc:'玩家第一次打开游戏，没有任何本地存储记录，需要输入名字才能进入游戏。同时测试中英文界面文本是否正确显示。',
      cases:[
        {id:'p0c0',text:'无 localStorage 时打开游戏，正确显示名字输入页面，不跳过直接进入游戏',tag:'normal',done:false},
        {id:'p0c1',text:'输入框默认为空，placeholder 显示正确（中文界面显示中文 placeholder，英文界面显示英文）',tag:'normal',done:false},
        {id:'p0c2',text:'输入框最多只能输入 12 个字符，超出后无法继续输入',tag:'normal',done:false},
        {id:'p0c3',text:'输入框为空点击确认，显示提示「请输入名字 / Please enter a name」',tag:'normal',done:false},
        {id:'p0c4',text:'输入全是空格点击确认，显示提示（不允许纯空格名字）',tag:'edge',done:false},
        {id:'p0c5',text:'按 Enter 键触发确认，效果与点击确认按钮一致',tag:'normal',done:false},
        {id:'p0c6',text:'按 ESC 键返回语言选择页面',tag:'normal',done:false},
        {id:'p0c7',text:'输入框自动获得焦点，玩家无需手动点击输入框',tag:'normal',done:false},
        {id:'p0c8',text:'输入中文名字（如「慕斯黎」）能正常显示和提交',tag:'edge',done:false},
        {id:'p0c9',text:'输入特殊字符（如 #、@、emoji）能正常处理，不报错',tag:'edge',done:false},
        {id:'p0c10',text:'页面标题和说明文字在中文模式下显示中文，英文模式下显示英文',tag:'normal',done:false},
      ]
    },
    {
      id:'p1', badge:'PHASE 1', name:'重名检测 — 全新名字', color:'green',
      time:'无 localStorage，输入从未使用过的名字',
      overlay:'NameInputPage → WorldSelect',
      trigger:'Firebase playerNames 集合查询返回 count=0',
      desc:'玩家输入一个从未被任何人使用过的名字，系统确认后直接保存到 localStorage 并进入游戏，不弹出任何重名提示。',
      cases:[
        {id:'p1c0',text:'输入全新名字点击确认，不弹出重名对话框，直接进入 WorldSelect',tag:'normal',done:false},
        {id:'p1c1',text:'进入 WorldSelect 后 localStorage 里正确保存了玩家名字',tag:'normal',done:false},
        {id:'p1c2',text:'window.playerName 全局变量正确设置为输入的名字',tag:'bug',done:false},
        {id:'p1c3',text:'Firebase playerNames 集合里新增了该名字的文档，count=1',tag:'normal',done:false},
        {id:'p1c4',text:'WorldSelect 页面左上角显示「欢迎！[名字]」，名字正确',tag:'normal',done:false},
        {id:'p1c5',text:'确认按钮在查询 Firebase 期间显示禁用状态，防止重复点击',tag:'bug',done:false},
      ]
    },
    {
      id:'p2', badge:'PHASE 2', name:'重名检测 — 已有同名玩家', color:'amber',
      time:'无 localStorage，输入已有人使用的名字',
      overlay:'NameInputPage — 重名确认对话框',
      trigger:'Firebase playerNames 集合查询返回 count>0',
      desc:'玩家输入一个已经有人使用过的名字，系统弹出重名确认对话框，提示「前方已有 X 个 [名字]，你确定还要用这个名字吗？」，给出「就要用！」和「换一个」两个选项。',
      cases:[
        {id:'p2c0',text:'输入已存在的名字，弹出重名确认对话框',tag:'normal',done:false},
        {id:'p2c1',text:'对话框显示正确的重名数量（如已有 3 个 moosry，显示 3）',tag:'normal',done:false},
        {id:'p2c2',text:'对话框中名字高亮显示，可读性强',tag:'normal',done:false},
        {id:'p2c3',text:'中文模式下对话框显示中文，英文模式下显示英文',tag:'normal',done:false},
        {id:'p2c4',text:'点击「就要用！/ Use it!」，保存名字加编号（如 moosry#2）进入游戏',tag:'normal',done:false},
        {id:'p2c5',text:'点击「换一个 / Choose Another」，关闭对话框回到输入框，输入框重新获得焦点',tag:'normal',done:false},

let data;
let currentFilter = 'all';

function loadData() {
  try {
    const stored = localStorage.getItem('local_player_test_data_v1');
    if (stored) {
      data = JSON.parse(stored);
    } else {
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    }
  } catch(e) {
    data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
}

function saveData() {
  localStorage.setItem('local_player_test_data_v1', JSON.stringify(data));
  const toast = document.getElementById('save-toast');
  toast.textContent = '✓ 已保存';
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 1200);
}

function getStats() {
  let total=0,done=0,normal=0,edge=0,bug=0,doneNormal=0,doneEdge=0,doneBug=0;
  data.phases.forEach(p => p.cases.forEach(c => {
    total++; if(c.done) done++;
    if(c.tag==='normal'){normal++;if(c.done)doneNormal++;}
    if(c.tag==='edge'){edge++;if(c.done)doneEdge++;}
    if(c.tag==='bug'){bug++;if(c.done)doneBug++;}
  }));
  return {total,done,normal,edge,bug,doneNormal,doneEdge,doneBug};
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function expandAll() { document.querySelectorAll('.phase-section').forEach(s=>s.classList.remove('collapsed')); }
function collapseAll() { document.querySelectorAll('.phase-section').forEach(s=>s.classList.add('collapsed')); }

function resetChecks() {
  if(!confirm('确认重置所有勾选状态？')) return;
  data.phases.forEach(p => p.cases.forEach(c => c.done = false));
  saveData(); render();
}

function toggleCase(phaseId, caseId) {
  const phase = data.phases.find(p=>p.id===phaseId);
  const c = phase.cases.find(c=>c.id===caseId);
  c.done = !c.done;
  saveData(); render();
}

function render() {
  const stats = getStats();
  document.getElementById('prog-nums').innerHTML = `${stats.done} <small>/ ${stats.total}</small>`;
  document.getElementById('prog-fill').style.width = stats.total ? (stats.done/stats.total*100)+'%' : '0%';
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-item"><span class="stat-val">${stats.doneNormal}/${stats.normal}</span><span class="stat-label">正常流程</span></div>
    <div class="stat-item"><span class="stat-val">${stats.doneEdge}/${stats.edge}</span><span class="stat-label">边界情况</span></div>
    <div class="stat-item"><span class="stat-val">${stats.doneBug}/${stats.bug}</span><span class="stat-label">潜在问题</span></div>
    <div class="stat-item"><span class="stat-val">${stats.total>0?Math.round(stats.done/stats.total*100):0}%</span><span class="stat-label">整体进度</span></div>
  `;

  const container = document.getElementById('phases-container');
  container.innerHTML = '';

  data.phases.forEach(phase => {
    const col = COLORS[phase.color||'purple'];
    let visibleCases = phase.cases;
    if(currentFilter==='normal') visibleCases = phase.cases.filter(c=>c.tag==='normal');
    else if(currentFilter==='edge') visibleCases = phase.cases.filter(c=>c.tag==='edge');
    else if(currentFilter==='bug') visibleCases = phase.cases.filter(c=>c.tag==='bug');
    else if(currentFilter==='undone') visibleCases = phase.cases.filter(c=>!c.done);

    const doneCnt = phase.cases.filter(c=>c.done).length;
    const allDone = doneCnt===phase.cases.length && phase.cases.length>0;

    const sec = document.createElement('div');
    sec.className = 'phase-section';
    sec.innerHTML = `
      <div class="phase-header" onclick="togglePhase(this)">
        <div class="phase-badge" style="background:${col.bg};color:${col.text};border:1px solid ${col.border}">${esc(phase.badge)}</div>
        <div class="phase-name-block">
          <div class="phase-name">${esc(phase.name)}</div>
          <div class="phase-shortdesc">${esc(phase.overlay||'')}${phase.trigger?' · '+esc(phase.trigger):''}</div>
        </div>
        <div class="phase-right">
          <span class="phase-stat${allDone?' all-done':''}">${doneCnt}/${phase.cases.length}</span>
          <button class="phase-edit-btn" onclick="event.stopPropagation();openEditPhaseModal('${phase.id}')">编辑</button>
          <span class="phase-arrow">▾</span>
        </div>
      </div>
      <div class="phase-detail">
        ${phase.time?`<div class="detail-item"><span class="detail-key">前置条件</span><span class="detail-val">${esc(phase.time)}</span></div>`:''}
        ${phase.overlay?`<div class="detail-item"><span class="detail-key">涉及页面</span><span class="detail-val">${esc(phase.overlay)}</span></div>`:''}
        ${phase.trigger?`<div class="detail-item"><span class="detail-key">触发条件</span><span class="detail-val">${esc(phase.trigger)}</span></div>`:''}
        ${phase.desc?`<div class="detail-item" style="width:100%"><span class="detail-key">说明</span><span class="detail-val">${esc(phase.desc)}</span></div>`:''}
      </div>
      <div class="cases-body" id="cases-${phase.id}"></div>
    `;

    const casesBody = sec.querySelector(`#cases-${phase.id}`);

    if(visibleCases.length===0){
      casesBody.innerHTML = `<div class="empty">— 该过滤条件下无用例 —</div>`;
    } else {
      visibleCases.forEach(c => {
        const row = document.createElement('div');
        row.className = 'case-row'+(c.done?' done':'');
        row.innerHTML = `
          <div class="case-check${c.done?' checked':''}" onclick="toggleCase('${phase.id}','${c.id}')"></div>
          <div class="case-content">
            <div class="case-text" onclick="toggleCase('${phase.id}','${c.id}')">${esc(c.text)}</div>
            <div class="case-tags"><span class="tag tag-${c.tag}">${c.tag==='normal'?'正常流程':c.tag==='edge'?'边界情况':'潜在问题'}</span></div>
          </div>
          <div class="case-actions">
            <button class="cbtn" onclick="openEditCaseModal('${phase.id}','${c.id}')">编辑</button>
            <button class="cbtn del" onclick="deleteCase('${phase.id}','${c.id}')">删除</button>
          </div>
        `;
        casesBody.appendChild(row);
      });
    }

    const addWrap = document.createElement('div');
    addWrap.className = 'add-case-wrap';
    addWrap.innerHTML = `
      <div class="add-case-row">
        <input class="add-input" id="quick-input-${phase.id}" placeholder="快速添加用例，按 Enter 确认..." onkeydown="if(event.key==='Enter')quickAdd('${phase.id}')">
        <select class="add-select" id="quick-tag-${phase.id}">
          <option value="normal">正常流程</option>
          <option value="edge">边界情况</option>
          <option value="bug">潜在问题</option>
        </select>
        <button class="btn" onclick="quickAdd('${phase.id}')">添加</button>
        <button class="btn" onclick="openAddCaseModal('${phase.id}')">详细添加</button>
      </div>
    `;
    casesBody.appendChild(addWrap);
    container.appendChild(sec);
  });
}

function togglePhase(header) {
  header.closest('.phase-section').classList.toggle('collapsed');
}

function quickAdd(phaseId) {
  const input = document.getElementById('quick-input-'+phaseId);
  const tag = document.getElementById('quick-tag-'+phaseId).value;
  const text = input.value.trim();
  if(!text) return;
  const phase = data.phases.find(p=>p.id===phaseId);
  phase.cases.push({id:'c_'+Date.now(), text, tag, done:false});
  input.value = '';
  saveData(); render();
  setTimeout(()=>{
    const inp = document.getElementById('quick-input-'+phaseId);
    if(inp) inp.focus();
  },50);
}

function deleteCase(phaseId, caseId) {
  if(!confirm('确认删除这个测试用例？')) return;
  const phase = data.phases.find(p=>p.id===phaseId);
  phase.cases = phase.cases.filter(c=>c.id!==caseId);
  saveData(); render();
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  document.getElementById('phase-desc-input').value='';

function openEditPhaseModal(phaseId){
  const phase = data.phases.find(p=>p.id===phaseId);
  document.getElementById('phase-modal-title').textContent='编辑测试阶段';
  document.getElementById('edit-phase-id').value=phase.id;
  document.getElementById('phase-badge-input').value=phase.badge;
  document.getElementById('phase-name-input').value=phase.name;
  document.getElementById('phase-color-input').value=phase.color||'purple';
  document.getElementById('phase-time-input').value=phase.time;
  document.getElementById('phase-overlay-input').value=phase.overlay;
  document.getElementById('phase-trigger-input').value=phase.trigger;
  document.getElementById('phase-desc-input').value=phase.desc;
  document.getElementById('delete-phase-btn').style.display='inline-block';
  openModal('phase-modal');
}

function savePhase(){
  const badge=document.getElementById('phase-badge-input').value.trim();
  const name=document.getElementById('phase-name-input').value.trim();
  if(!badge||!name){alert('阶段标识和名称不能为空');return;}
  const editId=document.getElementById('edit-phase-id').value;
  const phaseData={
    badge,name,
    color:document.getElementById('phase-color-input').value,
    time:document.getElementById('phase-time-input').value.trim(),
    overlay:document.getElementById('phase-overlay-input').value.trim(),
    trigger:document.getElementById('phase-trigger-input').value.trim(),
    desc:document.getElementById('phase-desc-input').value.trim(),
  };
  if(editId){
    const phase=data.phases.find(p=>p.id===editId);
    Object.assign(phase,phaseData);
  } else {
    phaseData.id='phase_'+Date.now();
    phaseData.cases=[];
    data.phases.push(phaseData);
  }
  closeModal('phase-modal');
  saveData();render();
}

function deleteCurrentPhase(){
  const id=document.getElementById('edit-phase-id').value;
  if(!confirm('确认删除这个阶段及其所有测试用例？'))return;
  data.phases=data.phases.filter(p=>p.id!==id);
  closeModal('phase-modal');
  saveData();render();
}

function openAddCaseModal(phaseId){
  document.getElementById('case-modal-title').textContent='新增测试用例';
  document.getElementById('edit-case-phase').value=phaseId;
  document.getElementById('edit-case-id').value='';
  document.getElementById('case-text-input').value='';
  document.getElementById('case-tag-input').value='normal';
  document.getElementById('delete-case-btn').style.display='none';
  populateCasePhaseSelect(phaseId);
  openModal('case-modal');
}

function openEditCaseModal(phaseId,caseId){
  const phase=data.phases.find(p=>p.id===phaseId);
  const c=phase.cases.find(c=>c.id===caseId);
  document.getElementById('case-modal-title').textContent='编辑测试用例';
  document.getElementById('edit-case-phase').value=phaseId;
  document.getElementById('edit-case-id').value=caseId;
  document.getElementById('case-text-input').value=c.text;
  document.getElementById('case-tag-input').value=c.tag;
  document.getElementById('delete-case-btn').style.display='inline-block';
  populateCasePhaseSelect(phaseId);
  openModal('case-modal');
}

function populateCasePhaseSelect(selectedId){
  const sel=document.getElementById('case-phase-select');
  sel.innerHTML=data.phases.map(p=>`<option value="${p.id}" ${p.id===selectedId?'selected':''}>${p.badge} · ${p.name}</option>`).join('');
}

function saveCase(){
  const text=document.getElementById('case-text-input').value.trim();
  if(!text){alert('测试内容不能为空');return;}
  const editId=document.getElementById('edit-case-id').value;
  const fromPhaseId=document.getElementById('edit-case-phase').value;
  const toPhaseId=document.getElementById('case-phase-select').value;
  const tag=document.getElementById('case-tag-input').value;
  if(editId){
    const fromPhase=data.phases.find(p=>p.id===fromPhaseId);
    const c=fromPhase.cases.find(c=>c.id===editId);
    if(fromPhaseId!==toPhaseId){
      fromPhase.cases=fromPhase.cases.filter(c=>c.id!==editId);
      const toPhase=data.phases.find(p=>p.id===toPhaseId);
      toPhase.cases.push({...c,text,tag});
    } else {
      c.text=text;c.tag=tag;
    }
  } else {
    const phase=data.phases.find(p=>p.id===toPhaseId);
    phase.cases.push({id:'c_'+Date.now(),text,tag,done:false});
  }
  closeModal('case-modal');
  saveData();render();
}

function deleteCurrentCase(){
  const phaseId=document.getElementById('edit-case-phase').value;
  const caseId=document.getElementById('edit-case-id').value;
  if(!confirm('确认删除这个测试用例？'))return;
  const phase=data.phases.find(p=>p.id===phaseId);
  phase.cases=phase.cases.filter(c=>c.id!==caseId);
  closeModal('case-modal');
  saveData();render();
}

function exportAsHTML(){
  const snapshot=JSON.stringify(data);
  const fullHTML=document.documentElement.outerHTML;
  const patched=fullHTML.replace(
    /function loadData\(\)\s*\{[\s\S]*?\}/,
    `function loadData() {
  try {
    const stored = localStorage.getItem('local_player_test_data_v1');
    if (stored) {
      data = JSON.parse(stored);
    } else {
      data = JSON.parse(${JSON.stringify(snapshot)});
    }
  } catch(e) {
    data = JSON.parse(${JSON.stringify(snapshot)});
  }
}`
  );
  const blob=new Blob([patched],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='本地玩家系统测试清单_'+new Date().toISOString().slice(0,10)+'.html';
  a.click();
  URL.revokeObjectURL(url);
  const toast=document.getElementById('save-toast');
  toast.textContent='✓ HTML 文件已导出';
  toast.style.display='block';
  setTimeout(()=>{toast.style.display='none';toast.textContent='✓ 已保存';},2000);
}

loadData();
render();
</script>
</body>
</html>
